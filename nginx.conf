server {
    listen 5173;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Rotas cujos GETs pertencem ao frontend (evita proxy de GET)
    location ~ ^/(login|register|cadastrar|alterar|reset-senha|login-multithread) {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors on;

        limit_except GET {
            proxy_pass http://nexus-service:8085;
        }
        try_files $uri /index.html;
    }

    # Rotas da API backend que aceitam e exigem requisições GET
    location ~ ^/(administracao|employee|employees|users|actuator) {
        proxy_pass http://nexus-service:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors on;
    }

    error_page 404 403 =200 /index.html;
}
